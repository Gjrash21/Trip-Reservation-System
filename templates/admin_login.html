{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="page-container centered">
  <div class="login-card">
    <div class="login-icon">🔒</div>
    <h1 class="login-title">Admin Login</h1>
    <p class="login-sub">Enter your administrator credentials to continue.</p>

    {% if error %}
    <div class="error-box single">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}" class="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="admin username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-primary full-width">Login →</button>
    </form>

    <div class="login-footer">
      <a href="{{ url_for('index') }}">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
